<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital QR Menu - Mekelle Cafe</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; }
        .container { width: 90%; max-width: 500px; margin: auto; padding: 15px; }
        .special-banner { background: #e74c3c; color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .menu-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .price { font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>
    <header>
        <h1>Mekelle Digital Cafe</h1>
        <p>Responsive QR Menu System</p>
    </header>
    <div class="container">
        <div class="special-banner">🔥 TODAY'S SPECIAL: Chechebsa - 120 ETB</div>
        <div class="menu-item">
            <div><strong>Macchiato</strong><br><small>Traditional Ethiopian style</small></div>
            <div class="price">30 ETB</div>
        </div>
        <div class="menu-item">
            <div><strong>Scrambled Eggs</strong><br><small>Served with fresh bread</small></div>
            <div class="price">90 ETB</div>
        </div>
    </div>
</body>
</html>
